# Generated by scripts/generate_compose.py
# Source of truth: core/**/manifests + apps/**/manifests + services/*/manifests
name: infra
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - ${POSTGRES_DATA_DIR:-../../data/postgres}:/var/lib/postgresql/data
      - ../../core/backing/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:${REDIS_CONTAINER_PORT:-6379}"
    volumes:
      - ../../core/backing/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  runtime-api:
    build:
      context: ../..
      dockerfile: services/runtime_api/infra/image/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/runtime_api.env
    ports:
      - "${API_HOST_PORT:-8000}:${API_CONTAINER_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10

  runtime-dashboard:
    build:
      context: ../..
      dockerfile: services/runtime_dashboard/infra/image/Dockerfile
    restart: unless-stopped
    ports:
      - "${DASHBOARD_HOST_PORT:-8080}:${DASHBOARD_CONTAINER_PORT:-80}"
    depends_on:
      runtime-api:
        condition: service_healthy

  g2b-api:
    build:
      context: ../..
      dockerfile: apps/g2b/api/infra/image/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
    ports:
      - "${G2B_API_HOST_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  g2b-pipeline-scheduler:
    build:
      context: ../..
      dockerfile: apps/g2b/pipeline_scheduler/infra/image/Dockerfile
    command: ["python", "-m", "apps.g2b.pipeline_scheduler.app.service.run_scheduler"]
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ../../apps/g2b/pipeline_scheduler/infra/env/pipeline_scheduler.env
      - ../../apps/g2b/pipeline_scheduler/infra/env/app.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  g2b-pipeline-worker:
    build:
      context: ../..
      dockerfile: apps/g2b/pipeline_worker/infra/image/Dockerfile
    command: ["python", "-m", "apps.g2b.pipeline_worker.app.service.run_worker"]
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ../../apps/g2b/pipeline_worker/infra/env/pipeline_worker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingest-api-worker:
    build:
      context: ../..
      dockerfile: services/ingest_api/infra/image/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/worker.common.env
      - ./env/workers/worker.ingest_api.env
      - ../../apps/g2b/pipeline_scheduler/infra/env/app.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  ingest-file-worker:
    build:
      context: ../..
      dockerfile: services/ingest_file/infra/image/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/worker.common.env
      - ./env/workers/worker.ingest_file.env
      - ../../apps/g2b/pipeline_scheduler/infra/env/app.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
