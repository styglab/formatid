# Generated by scripts/generate_compose.py
# Source of truth: infra/platform_services/*.json + domains/*/manifests/*.json
services:
  api:
    build:
      context: ..
      dockerfile: infra/images/api/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/api.env
    ports:
      - "${API_HOST_PORT:-8000}:${API_CONTAINER_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres/data}:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:${REDIS_CONTAINER_PORT:-6379}"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  scheduler:
    build:
      context: ..
      dockerfile: infra/images/scheduler/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/scheduler.env
      - ../domains/pps/env/scheduler.pps.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pps-attachment-worker:
    build:
      context: ..
      dockerfile: domains/pps/images/pps_attachment/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/worker.common.env
      - ../domains/pps/env/worker.pps-attachment.env
    volumes:
      - ../logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  pps-bid-worker:
    build:
      context: ..
      dockerfile: domains/pps/images/pps_bid/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/worker.common.env
      - ../domains/pps/env/worker.pps-bid.env
    volumes:
      - ../logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
