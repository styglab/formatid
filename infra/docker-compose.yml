# Generated by scripts/generate_compose.py
# Source of truth: infra/platform_services/*.json + apps/*/manifests + services/*/manifests
services:
  api:
    build:
      context: ..
      dockerfile: infra/images/api/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/api.env
    ports:
      - "${API_HOST_PORT:-8000}:${API_CONTAINER_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build:
      context: ..
      dockerfile: infra/images/dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - "${DASHBOARD_HOST_PORT:-8080}:${DASHBOARD_CONTAINER_PORT:-80}"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres/data}:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - ${QDRANT_DATA_DIR:-./qdrant/storage}:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:${REDIS_CONTAINER_PORT:-6379}"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  g2b-ingest:
    build:
      context: ..
      dockerfile: apps/g2b_ingest/infra/images/g2b_ingest_service/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ../apps/g2b_ingest/infra/env/g2b_ingest_service.env
      - ./env/worker.common.env
      - ../apps/g2b_ingest/infra/env/service.env
      - ../apps/g2b_ingest/infra/env/api.env
      - ../apps/g2b_ingest/infra/env/ingest.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  g2b-summary-api:
    build:
      context: ..
      dockerfile: apps/g2b_summary/infra/images/summary_api/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ../apps/g2b_summary/infra/env/api.env
    ports:
      - "${G2B_SUMMARY_API_HOST_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  extract-text-worker:
    build:
      context: ..
      dockerfile: infra/images/workers/extract_text/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/worker.common.env
      - ./env/workers/worker.extract_text.env
      - ../apps/g2b_summary/infra/env/worker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  ingest-api-worker:
    build:
      context: ..
      dockerfile: infra/images/workers/ingest_api/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/worker.common.env
      - ./env/workers/worker.ingest_api.env
      - ../apps/g2b_ingest/infra/env/ingest.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  ingest-file-worker:
    build:
      context: ..
      dockerfile: infra/images/workers/ingest_file/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/worker.common.env
      - ./env/workers/worker.ingest_file.env
      - ../apps/g2b_ingest/infra/env/ingest.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  serve-llm-worker:
    build:
      context: ..
      dockerfile: infra/images/workers/serve_llm/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
      - ./env/worker.common.env
      - ./env/workers/worker.serve_llm.env
      - ../apps/g2b_summary/infra/env/worker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
