# Generated by scripts/generate_compose.py
# Source of truth: infra/platform_services/*.json + infra/worker_services/*.json
services:
  api:
    build:
      context: ..
      dockerfile: infra/images/api/Dockerfile
    user: "${UID}:${GID}"
    restart: unless-stopped
    env_file:
      - ./env/api.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  scheduler:
    build:
      context: ..
      dockerfile: infra/images/scheduler/Dockerfile
    user: "${UID}:${GID}"
    restart: unless-stopped
    env_file:
      - ./env/scheduler.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pps-attachment-worker:
    build:
      context: ..
      dockerfile: infra/images/pps_attachment/Dockerfile
    user: "${UID}:${GID}"
    restart: unless-stopped
    env_file:
      - ./env/worker.common.env
      - ./env/worker.pps-attachment.env
    volumes:
      - ../logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  pps-bid-worker:
    build:
      context: ..
      dockerfile: infra/images/pps_bid/Dockerfile
    user: "${UID}:${GID}"
    restart: unless-stopped
    env_file:
      - ./env/worker.common.env
      - ./env/worker.pps-bid.env
    volumes:
      - ../logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

volumes:
  postgres-data:
