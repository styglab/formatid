name: Compose Smoke Test 

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  compose-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Docker Compose smoke test
        run: python3 scripts/run_compose_smoke_test.py
